name: Setup
description: Install pnpm, Node, and the project's dependencies from a frozen lockfile.

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6

    - uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - run: pnpm install --frozen-lockfile
      shell: bash
