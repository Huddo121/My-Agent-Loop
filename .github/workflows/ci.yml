name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel superseded runs for the same branch/PR so we don't queue stale work.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin moon to the version used locally; setup-toolchain otherwise installs the
  # latest, whose config schema rejects this repo's moon.yml files.
  MOON_VERSION: "1.38.3"

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    # The frontend runs Storybook stories in a real Chromium via Playwright.
    # Use the official Playwright image, which ships the matching browsers and
    # their system libraries preinstalled, rather than downloading them per run
    # (that step stalled intermittently on the runner's network / apt locks).
    # The tag must track the `playwright` version in apps/frontend.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm test

  migrations:
    name: Migrations in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      # Committed migrations must match the schema. Regenerate and fail if the
      # working tree changes, so a schema edit without `db:generate` is caught
      # here rather than on the production host.
      - name: Verify migrations are in sync with the schema
        env:
          # drizzle-kit generate does not connect, but the config reads this.
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
        run: |
          pnpm --filter @mono/server db:generate
          if ! git diff --quiet --exit-code apps/server/drizzle; then
            echo "::error::Drizzle migrations are out of sync with src/db/schema.ts."
            echo "Run 'pnpm --filter @mono/server db:generate' locally and commit the result."
            git --no-pager diff apps/server/drizzle
            exit 1
          fi

  native-builds:
    name: Native build allow-list
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm check:native-builds

  moon-sync:
    name: Moon sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - uses: moonrepo/setup-toolchain@v0
        with:
          moon-version: ${{ env.MOON_VERSION }}
          auto-install: false
      - run: pnpm sync
      - name: Verify project references are in sync
        run: |
          if ! git diff --quiet --exit-code; then
            echo "::error::Moon project references are out of sync."
            echo "Run 'pnpm sync' locally and commit the result."
            echo ""
            echo "Files with drift:"
            git diff --name-only | sed 's/^/  - /'
            echo ""
            git --no-pager diff
            exit 1
          fi

  build:
    name: Build (affected)
    runs-on: ubuntu-latest
    steps:
      # moon compares against a base revision to find affected projects, so it
      # needs the full history rather than a shallow checkout.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # moon doesn't manage the Node toolchain here (no pinned version), so it
      # won't install dependencies itself — do it via the shared setup.
      - uses: ./.github/actions/setup
      - uses: moonrepo/setup-toolchain@v0
        with:
          moon-version: ${{ env.MOON_VERSION }}
      - run: moon ci

  # Single aggregate gate so branch protection only has to require one check.
  # To make a new job required, add it to `needs` below rather than editing the
  # ruleset — this list is the source of truth for what must pass to merge.
  ci-gate:
    name: CI gate
    # Must run even when a dependency fails or is cancelled: a job with `needs`
    # is otherwise skipped, and a skipped required check never reports a status,
    # which wedges the PR on "Expected — Waiting for status to be reported".
    if: ${{ always() }}
    needs: [lint, typecheck, test, migrations, native-builds, moon-sync, build]
    runs-on: ubuntu-latest
    steps:
      # `needs.*.result` is the list of dependency outcomes. A cancelled run
      # (e.g. superseded via the concurrency group) is treated as a failure so
      # it can't pass as green.
      - name: Verify all required jobs succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "::error::One or more required CI jobs did not succeed."
          exit 1
