name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel superseded runs for the same branch/PR so we don't queue stale work.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin moon to the version used locally; setup-toolchain otherwise installs the
  # latest, whose config schema rejects this repo's moon.yml files.
  MOON_VERSION: "1.38.3"

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm typecheck

  test:
    name: Tests
    runs-on: ubuntu-latest
    # Guards against a hung run (e.g. the browser install stalling on an apt
    # lock) rather than burning a full job timeout.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      # The frontend runs Storybook stories in a real Chromium via Playwright.
      # ubuntu-latest already ships Chromium's system libraries, so we install
      # only the browser binary (not `--with-deps`, whose apt step is slow and
      # prone to hanging on the runner's background package locks) and cache it.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright Chromium
        run: pnpm --filter @mono/frontend exec playwright install chromium
      - run: pnpm test

  native-builds:
    name: Native build allow-list
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm check:native-builds

  moon-sync:
    name: Moon sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - uses: moonrepo/setup-toolchain@v0
        with:
          moon-version: ${{ env.MOON_VERSION }}
          auto-install: false
      - run: pnpm sync
      - name: Verify project references are in sync
        run: |
          if ! git diff --quiet --exit-code; then
            echo "::error::Moon project references are out of sync."
            echo "Run 'pnpm sync' locally and commit the result."
            echo ""
            echo "Files with drift:"
            git diff --name-only | sed 's/^/  - /'
            echo ""
            git --no-pager diff
            exit 1
          fi

  build:
    name: Build (affected)
    runs-on: ubuntu-latest
    steps:
      # moon compares against a base revision to find affected projects, so it
      # needs the full history rather than a shallow checkout.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # moon doesn't manage the Node toolchain here (no pinned version), so it
      # won't install dependencies itself — do it via the shared setup.
      - uses: ./.github/actions/setup
      - uses: moonrepo/setup-toolchain@v0
        with:
          moon-version: ${{ env.MOON_VERSION }}
      - run: moon ci
