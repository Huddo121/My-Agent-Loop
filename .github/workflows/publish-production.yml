name: Publish production

# Build and publish immutable, SHA-tagged linux/amd64 images to GHCR after CI
# passes on main. The host deploys by pulling these exact SHA tags; nothing here
# touches the host directly. A separate notification step (owned by the
# deploy-notification work) tells the host a full set of images now exists.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Only the newest main build should win. Cancelling obsolete in-progress runs
# stops an older build from publishing (and later notifying) after a newer one
# has started.
concurrency:
  group: publish-production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_BASE: ghcr.io/huddo121
  # The sandbox/VM jobs build the driver via `moon` (pnpm driver:build:linux ->
  # moon driver:build-linux), so they need the CLI installed. Pin it to the
  # version CI uses; setup-toolchain otherwise grabs the latest, whose config
  # schema rejects this repo's moon.yml files.
  MOON_VERSION: "1.38.3"

jobs:
  # Resolve the commit to build and decide whether to run at all. workflow_run
  # fires even on CI failure, so gate on conclusion == success here; manual
  # dispatch always proceeds.
  meta:
    name: Resolve commit
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  server:
    name: Server image
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.meta.outputs.sha }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Packaging-only Dockerfile: prepare the bundle outside Docker first.
      - name: Prepare server deploy bundle
        run: |
          pnpm --filter @mono/server build
          rm -rf apps/server/deploy
          pnpm --filter=@mono/server deploy --prod --legacy apps/server/deploy
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: apps/server/deploy
          file: apps/server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_BASE }}/my-agent-loop-server:${{ needs.meta.outputs.sha }}

  frontend:
    name: Frontend image
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.meta.outputs.sha }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build static SPA
        run: pnpm --filter @mono/frontend build
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: apps/frontend
          file: apps/frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_BASE }}/my-agent-loop-frontend:${{ needs.meta.outputs.sha }}

  sandbox:
    name: Docker sandbox image
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.meta.outputs.sha }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: moonrepo/setup-toolchain@v0
        with:
          moon-version: ${{ env.MOON_VERSION }}
          auto-install: false
      # The root Dockerfile copies the prebuilt Linux driver; build it first.
      - name: Build Linux driver binary
        run: pnpm driver:build:linux
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_BASE }}/my-agent-loop-sandbox:${{ needs.meta.outputs.sha }}

  vm:
    name: VM sandbox image
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.meta.outputs.sha }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: moonrepo/setup-toolchain@v0
        with:
          moon-version: ${{ env.MOON_VERSION }}
          auto-install: false
      # Builds the Linux driver + sandbox image, exports the ext4 rootfs, and
      # downloads the matching amd64 kernel into .vm/. Needs privileged Docker
      # (loopback mount + mkfs.ext4), which GitHub-hosted runners allow.
      - name: Build VM rootfs and kernel
        run: pnpm vm:build-rootfs
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Wrap the rootfs + kernel in a FROM scratch image (deploy/vm-image). The
      # build context is the artifact output dir .vm.
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .vm
          file: deploy/vm-image/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_BASE }}/my-agent-loop-sandbox-vm:${{ needs.meta.outputs.sha }}

  # Notify the homelab deploy webhook only after every image for this SHA exists.
  # The shared adnanh/webhook listener on deimos validates the token and invokes
  # the root-owned deploy-my-agent-loop script, which pulls these exact GHCR tags.
  # Gated on the DEPLOY_ENABLED repo variable so publishing can run without
  # auto-deploying; runs in the `production` environment to scope the secret.
  notify:
    name: Notify deploy webhook
    needs: [meta, server, frontend, sandbox, vm]
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Trigger deployment
        env:
          WEBHOOK_URL: ${{ secrets.MAL_DEPLOY_WEBHOOK_URL }}
          DEPLOY_TOKEN: ${{ secrets.MAL_DEPLOY_WEBHOOK_TOKEN }}
          SHA: ${{ needs.meta.outputs.sha }}
        run: |
          curl --fail-with-body --show-error --silent \
            --header "Content-Type: application/json" \
            --header "X-Deploy-Token: ${DEPLOY_TOKEN}" \
            --data "{\"version\":\"${SHA}\"}" \
            "${WEBHOOK_URL}"
