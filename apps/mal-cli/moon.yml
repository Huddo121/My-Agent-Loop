tasks:
  dev:
    command: noop
    local: true
  build-bundle:
    command: node build.mjs
    outputs:
      - dist-sea/index.cjs
  build-sea:
    command: node build-sea.mjs
    deps:
      - mal-cli:build-bundle
    outputs:
      - dist-sea/mal-cli
      - dist-sea/sea-blob.blob
      - dist-sea/sea-config.json
  build-linux:
    command: node build-linux.mjs
    deps:
      - mal-cli:build-bundle
    outputs:
      - dist-sea/linux/mal-cli
      - dist-sea/sea-blob.blob
      - dist-sea/sea-config.json
      - dist-sea/.node-linux
  build:
    command: noop
    deps:
      - mal-cli:build-sea
