# Host ports and volume paths are parameterised so the Portless dev wrapper can
# bring up isolated per-worktree stacks (`docker compose -p mal-<worktree>`)
# without clashing with the shared stack. Unset vars fall back to the original
# shared-stack defaults, so a plain `docker compose up` is unchanged.
# `container_name` is intentionally omitted: it is global, so pinning it would
# stop a second (isolated) stack from starting.
services:
  my-agent-loop-db:
    image: postgres:18.1
    ports:
      - ${MAL_DB_PORT:-5432}:5432
    restart: unless-stopped
    environment:
      - POSTGRES_DB=my_agent_loop
      - POSTGRES_USER=my_agent_loop
      - POSTGRES_PASSWORD=my_agent_loop
    volumes:
      - ./.devloop/volumes/${MAL_STACK:-my_agent_loop}/data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 5s
      timeout: 10s
      retries: 10

  # http://localhost:8010/?pgsql=my-agent-loop-db&username=my_agent_loop&db=my_agent_loop&ns=public
  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - ${MAL_ADMINER_PORT:-8010}:8080

  my-agent-loop-redis:
    image: redis:8.2.0
    ports:
      - ${MAL_REDIS_PORT:-6379}:6379
    volumes:
      - ./.devloop/volumes/${MAL_STACK:-my_agent_loop}/redis:/data
